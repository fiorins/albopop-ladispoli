name: Albo Pretorio Scraper

on:
  schedule:
    - cron: "*/30 * * * *"  # every 30 minutes
  workflow_dispatch:          # allows manual trigger from GitHub UI

permissions:
  contents: write             # needed to commit seen.json, feed.xml back

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore data files from data branch  # ← must be first
        run: |
          git fetch origin data
          git checkout origin/data -- seen.json feed.xml || true

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create secrets files
        run: |
          mkdir -p .secrets
          printf '%s' '${{ secrets.BOX_CONFIG_JSON }}' > .secrets/config_box.json
          printf '%s' '${{ secrets.GOOGLE_CONFIG_JSON }}' > .secrets/config_google.json

      - name: Run scraper
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python albo-ladispoli.py

      - name: Commit updated files
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add seen.json feed.xml
          git diff --staged --quiet || (git commit -m "Update feed [skip ci]" && git push)

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID_UPDATES }}" \
          -d text="⚠️ Albo scraper failed on $(date '+%Y-%m-%d %H:%M')"
