name: Albo Pretorio Scraper

on:
  # schedule:
    # - cron: '*/30 * * * *'
  workflow_dispatch: # Allow manual run

permissions:
  contents: write # Needed to push to repo

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout your main branch (code lives here)
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Needed to access other branches (data)

      # 2. Try to restore previous data from data branch
      - name: Restore data files from data branch
        run: |
          git fetch origin data || true
          # If files exist, bring them into current working directory
          git checkout origin/data -- seen.json feed.xml || echo "No previous data files found."

          # Fallback: create seen.json if it does not exist yet
          [ -f seen.json ] || echo "[]" > seen.json

      # 3. Setup Python
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          
      # 4. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 5. Create secrets files (used by your script)
      - name: Create secrets files
        run: |
          mkdir -p .secrets
          printf '%s' '${{ secrets.BOX_CONFIG_JSON }}' > .secrets/config_box.json
          printf '%s' '${{ secrets.GOOGLE_CONFIG_JSON }}' > .secrets/config_google.json

      # 6. Run your scraper
      - name: Run scraper
        env:
          ROOT_URL: ${{ vars.ROOT_URL }}
          ELEMENT_BASE_URL: ${{ vars.ELEMENT_BASE_URL }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_ID_UPDATES: ${{ secrets.TELEGRAM_CHAT_ID_UPDATES }}
          ATTACHMENT_FOLDER_ID: ${{ secrets.ATTACHMENT_FOLDER_ID }}
        run: python albo-ladispoli.py

      # 7. Save updated data into data branch
      - name: Commit data files to data branch
        if: success()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # Safety fallback: make sure files exist before copying/adding
          [ -f seen.json ] || echo "[]" > seen.json
          [ -f feed.xml ] || echo '<?xml version="1.0" encoding="UTF-8"?><rss version="2.0"><channel><title>Albo Pretorio Ladispoli</title></channel></rss>' > feed.xml

          # Save generated files temporarily (so we don't lose them when switching branch)
          mkdir -p /tmp/albo-data
          cp seen.json /tmp/albo-data/seen.json 2>/dev/null || true
          cp feed.xml /tmp/albo-data/feed.xml 2>/dev/null || true

          # This avoids GitHub Pages processing issues
          touch /tmp/albo-data/.nojekyll

          # Fetch data branch if exists
          git fetch origin data || true

          # Switch to data branch (create if missing)
          if git ls-remote --exit-code --heads origin data; then
            git switch -C data origin/data
          else
            git switch --orphan data
            git rm -rf . || true 
          fi

          # Copy files back into this branch
          cp /tmp/albo-data/seen.json ./seen.json
          cp /tmp/albo-data/feed.xml ./feed.xml
          cp /tmp/albo-data/.nojekyll ./.nojekyll

          # Stage only the data files
          git add seen.json feed.xml .nojekyll

          # If nothing changed → exit
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          
          # Commit + push to data branch
          git commit -m "Update data $(date +'%Y-%m-%d %H:%M')"
          git push origin data

      # 8. Notify on failure
      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID_UPDATES }}" \
          -d text="⚠️ Albo scraper failed on $(date '+%Y-%m-%d %H:%M')"
